<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suppliers Management</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f4f6f8;
    }

    h2 {
      color: #002b5b;
      margin-bottom: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 25px;
    }

    table, th, td {
      border: 1px solid #ccc;
    }

    th, td {
      padding: 10px;
      text-align: left;
    }

    th {
      background-color: #007bff;
      color: white;
    }

    tr:nth-child(even) {
      background-color: #e9edf5;
    }

    .form-container {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      max-width: 500px;
      margin-bottom: 30px;
    }

    .form-container input {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .form-container button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background-color: #007bff;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .form-container button:hover {
      background-color: #005ecb;
    }

    .action-btn {
      padding: 5px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 5px;
      color: white;
    }

    .edit-btn { background: #ffc107; }
    .delete-btn { background: #dc3545; }

  </style>
</head>
<body>

  <h2>Suppliers Management</h2>

  <div class="form-container">
    <h3 id="form-title">Add New Supplier</h3>
    <input type="text" id="supplierName" placeholder="Supplier Name" required>
    <input type="text" id="supplierEmail" placeholder="Supplier Email" required>
    <input type="text" id="supplierPhone" placeholder="Supplier Phone" required>
    <button id="submitBtn">Add Supplier</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="supplierTable">
      <!-- Suppliers will appear here -->
    </tbody>
  </table>

  <script>
    let suppliers = [];
    let editIndex = -1;

    const supplierTable = document.getElementById("supplierTable");
    const submitBtn = document.getElementById("submitBtn");
    const formTitle = document.getElementById("form-title");

    function renderTable() {
      supplierTable.innerHTML = "";
      suppliers.forEach((sup, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${sup.name}</td>
          <td>${sup.email}</td>
          <td>${sup.phone}</td>
          <td>
            <button class="action-btn edit-btn" onclick="editSupplier(${index})">Edit</button>
            <button class="action-btn delete-btn" onclick="deleteSupplier(${index})">Delete</button>
          </td>
        `;
        supplierTable.appendChild(row);
      });
    }

    function resetForm() {
      document.getElementById("supplierName").value = "";
      document.getElementById("supplierEmail").value = "";
      document.getElementById("supplierPhone").value = "";
      formTitle.textContent = "Add New Supplier";
      submitBtn.textContent = "Add Supplier";
      editIndex = -1;
    }

    submitBtn.addEventListener("click", function() {
      const name = document.getElementById("supplierName").value.trim();
      const email = document.getElementById("supplierEmail").value.trim();
      const phone = document.getElementById("supplierPhone").value.trim();

      if (!name || !email || !phone) return alert("Please fill in all fields");

      if (editIndex === -1) {
        // Add new supplier
        suppliers.push({ name, email, phone });
      } else {
        // Edit existing supplier
        suppliers[editIndex] = { name, email, phone };
      }

      renderTable();
      resetForm();
    });

    function editSupplier(index) {
      const sup = suppliers[index];
      document.getElementById("supplierName").value = sup.name;
      document.getElementById("supplierEmail").value = sup.email;
      document.getElementById("supplierPhone").value = sup.phone;
      formTitle.textContent = "Edit Supplier";
      submitBtn.textContent = "Update Supplier";
      editIndex = index;
    }

    function deleteSupplier(index) {
      if (confirm("Are you sure you want to delete this supplier?")) {
        suppliers.splice(index, 1);
        renderTable();
        resetForm();
      }
    }

  </script>

</body>
</html>
